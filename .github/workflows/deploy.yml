name: Deploy Books to GitHub Pages

on:
  push:
    branches:
      - main
      - 'book/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout all branches
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build every book branch into its own URL path
        run: |
          set -euo pipefail
          SITE_DIR="$PWD/site"
          mkdir -p "$SITE_DIR"

          # Root site from main (landing / latest main book)
          export VITE_BASE=/TextBook/
          npm run build
          cp -R dist/. "$SITE_DIR/"

          # One live URL per book branch:
          # https://udaymi8871.github.io/TextBook/01-demo-1/
          # https://udaymi8871.github.io/TextBook/03-demo-3/
          for branch in $(git branch -r | sed 's|^[[:space:]]*origin/||' | grep '^book/'); do
            slug="${branch#book/}"
            echo "::group::Building $branch → /$slug/"
            git checkout -f "$branch"
            npm ci
            export VITE_BASE="/TextBook/${slug}/"
            npm run build
            mkdir -p "$SITE_DIR/$slug"
            cp -R dist/. "$SITE_DIR/$slug/"
            # SPA fallback for nested paths
            cp "$SITE_DIR/$slug/index.html" "$SITE_DIR/$slug/404.html"
            echo "::endgroup::"
          done

          git checkout -f main
          ls -la "$SITE_DIR"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
